<div class="flex items-center justify-center min-h-screen bg-astro-black">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="p-8 bg-astro-dark border border-astro-red rounded-lg w-full max-w-sm">
    <h2 class="text-2xl text-astro-red mb-6 font-bold">Acesso KósmosHub</h2>
    
    <div class="mb-4">
      <input formControlName="email" type="email" placeholder="Email" class="w-full p-3 bg-black border border-astro-red text-white rounded">
    </div>
    
    <div class="mb-6">
      <input formControlName="password" type="password" placeholder="Senha" class="w-full p-3 bg-black border border-astro-red text-white rounded">
    </div>

    <button type="submit" [disabled]="loginForm.invalid" class="w-full py-3 bg-astro-red text-black font-bold rounded hover:opacity-90 transition-opacity">
      Entrar
    </button>
  </form>
</div>
