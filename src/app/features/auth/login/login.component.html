<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans">
  
  <div class="relative w-full max-w-md rounded-[2rem] p-10 backdrop-blur-xl transition-all duration-500 z-10"
       [ngClass]="{
         'bg-white/60 border border-white/50 shadow-2xl text-slate-900': theme() === 'light',
         'bg-white/5 border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] text-white': theme() === 'dark',
         'bg-red-950/20 border border-mars-red/20 shadow-[0_0_40px_rgba(239,68,68,0.15)] text-mars-red': theme() === 'red'
       }">
    
    <div class="text-center mb-10">
      
      <div class="inline-flex items-center justify-center w-24 h-24 rounded-full overflow-hidden border p-1 transition-all duration-500 shadow-lg relative"
           [ngClass]="{
             'bg-white border-slate-300 shadow-slate-900/10': theme() === 'light',
             'bg-space-blue/50 border-white/20 shadow-[0_0_25px_rgba(99,102,241,0.25)]': theme() === 'dark',
             'bg-red-950/80 border-mars-red shadow-[0_0_25px_rgba(239,68,68,0.4)]': theme() === 'red'
           }">
        
        <img src="/assets/images/logo-icon.png" alt="KósmosHub Logo" class="w-full h-full object-cover rounded-full">
        
        @if (theme() === 'red') {
          <div class="absolute inset-0 bg-red-600/20 mix-blend-color pointer-events-none animate-pulse"></div>
        }
      </div>
      <h1 class="text-4xl font-heading font-bold tracking-widest uppercase mt-4">KósmosHub</h1>
      <p class="text-xs opacity-70 mt-3 font-mono uppercase tracking-[0.3em]">Portal de Acesso</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      
      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] uppercase tracking-widest opacity-80 font-bold ml-1">Correio Eletrónico</label>
        <input type="email" formControlName="email" placeholder="astronomo@kosmos.com"
               class="w-full px-4 py-3.5 rounded-2xl bg-transparent border outline-none font-mono text-sm"
               [ngClass]="theme() === 'red' ? 'border-mars-red/30 text-mars-red placeholder-mars-red/30' : 'border-slate-300'"></div >

      <div class="flex flex-col gap-1.5">
        <label class="text-[10px] uppercase tracking-widest opacity-80 font-bold ml-1">Senha de Ignição</label>
        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                 class="w-full px-4 py-3.5 rounded-2xl bg-transparent border outline-none font-mono text-sm pr-12"
                 [ngClass]="theme() === 'red' ? 'border-mars-red/30 text-mars-red placeholder-mars-red/30' : 'border-slate-300'">
          
          <button type="button" 
                  (mousedown)="showPassword = true" 
                  (mouseup)="showPassword = false" 
                  (mouseleave)="showPassword = false"
                  (touchstart)="showPassword = true"
                  (touchend)="showPassword = false"
                  class="absolute inset-y-0 right-0 pr-4 flex items-center opacity-50 hover:opacity-100 transition-opacity focus:outline-none">
            <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      @if (errorMessage) {
        <div class="text-center text-xs font-bold animate-pulse p-2 rounded-lg" 
             [ngClass]="theme() === 'red' ? 'bg-mars-red/10 text-mars-red' : 'bg-red-500/10 text-red-400'">
          <i class="fa-solid fa-triangle-exclamation mr-2"></i> {{ errorMessage }}
        </div>
      }

      <button type="submit" [disabled]="loginForm.invalid || isLoading"
              class="w-full py-4 mt-4 rounded-2xl font-bold uppercase tracking-widest text-xs transition-all duration-300"
              [ngClass]="theme() === 'red' ? 'bg-mars-red text-pure-black' : 'bg-slate-900 text-white'">
        @if (isLoading) {
          <i class="fa-solid fa-circle-notch fa-spin text-lg"></i>
        } @else {
          Iniciar Sessão
        }
      </button>
    </form>
  </div>
</div>
