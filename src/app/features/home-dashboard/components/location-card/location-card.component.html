<div class="w-full h-full rounded-[2rem] border overflow-hidden relative transition-all duration-300 group shadow-lg active:scale-[0.98] min-h-[260px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
     [ngClass]="cardClasses">

  @if (mapUrl) {
    <iframe [src]="mapUrl" 
            class="absolute inset-0 w-full h-full border-0 z-10 opacity-100 pointer-events-auto"
            loading="lazy"></iframe>
  }

  @if (theme() === 'red') {
    <div class="absolute inset-0 z-20 bg-red-600 mix-blend-multiply pointer-events-none opacity-90"></div>
    <div class="absolute inset-0 z-20 bg-gradient-to-t from-black via-transparent to-black/20 pointer-events-none"></div>
  } @else {
    <div class="absolute inset-0 z-20 bg-gradient-to-t from-black/40 via-transparent to-black/10 pointer-events-none"></div>
  }

  <div class="absolute inset-x-4 top-4 z-30 pointer-events-none flex flex-wrap justify-between items-start gap-3">
    
    <div class="bg-white/5 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 shadow-lg shrink-0">
      <h2 class="text-[10px] uppercase tracking-widest font-heading opacity-90 flex items-center gap-2 text-white">
        <i class="fa-solid fa-location-crosshairs"></i> Localização Atual
      </h2>
    </div>

    <div class="bg-white/5 backdrop-blur-xl p-3 lg:p-2 xl:p-4 rounded-2xl border border-white/10 shadow-2xl text-right shrink-0">
      <p class="text-xl lg:text-sm xl:text-lg font-bold font-mono tracking-wider text-white drop-shadow-md leading-none">
         {{ locationCoords.latStr }}
      </p>
      <p class="text-lg lg:text-xs xl:text-base font-bold font-mono text-white/80 mt-1 drop-shadow-md leading-none">
         {{ locationCoords.lonStr }}
      </p>
    </div>

  </div>
</div>
