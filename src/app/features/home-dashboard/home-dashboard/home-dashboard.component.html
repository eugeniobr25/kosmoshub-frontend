<div class="p-4 lg:p-2 w-full max-w-full mx-auto flex flex-col justify-between gap-4 select-none transition-all duration-300
            h-auto min-h-screen overflow-y-auto
            [@media(min-width:1200px)_and_(min-height:600px)]:h-[calc(100vh-5rem)] 
            [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0 
            [@media(min-width:1200px)_and_(min-height:600px)]:overflow-hidden">

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 flex-1 min-h-0 w-full
              [@media(min-width:1200px)_and_(min-height:600px)]:grid-rows-[2fr_3fr]">

    <app-location-card class="col-span-1 block w-full h-full min-h-[260px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                       [locationCoords]="locationCoords()" [mapUrl]="mapUrl()" [cardClasses]="cardClasses()">
    </app-location-card>

    <app-time-sync-card class="col-span-1 block w-full h-full min-h-[260px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                        [cardClasses]="cardClasses()">
    </app-time-sync-card>

    <app-weather-card class="col-span-1 block w-full h-full min-h-[280px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                      [cardClasses]="cardClasses()"
                      [isWeatherLoading]="isWeatherLoading()"
                      [weatherData]="weatherData()"
                      [isNight]="isNight()"
                      [currentDayAlert]="currentDayAlert()"
                      [currentNightTip]="currentNightTip()">
    </app-weather-card>

    <app-plan-card class="col-span-1 block w-full h-full min-h-[260px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                   [cardClasses]="cardClasses()" [isLoadingPlan]="isLoadingPlan()" [latestPlan]="latestPlan()">
    </app-plan-card>

    <app-observation-card class="col-span-1 md:col-span-2 lg:col-span-2 block w-full h-full min-h-[350px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                          [cardClasses]="cardClasses()" [isLoadingPost]="isLoadingPost()" [latestPost]="latestPost()" (imageClick)="openImageModal()">
    </app-observation-card>

    <app-knowledge-card class="col-span-1 md:col-span-2 lg:col-span-2 block w-full h-full min-h-[350px] [@media(min-width:1200px)_and_(min-height:600px)]:min-h-0"
                        [cardClasses]="cardClasses()" [isLoadingDiy]="isLoadingDiy()" [latestDiy]="latestDiy()">
    </app-knowledge-card>
  </div>

  <footer class="w-full py-2 border-t border-current/10 flex flex-col sm:flex-row items-center justify-between gap-4 text-[10px] opacity-60 flex-shrink-0 mt-1">
    <div class="flex items-center gap-2 select-none">
      <img src="/assets/images/logo-no-name.png" class="w-4 h-4 object-contain opacity-80" alt="Mini Ícone">
      <span class="font-heading font-bold tracking-wider uppercase text-[11px] leading-tight break-words whitespace-normal">
        @if (theme() === 'light') { <span class="text-slate-900">Kósmos</span><span class="text-indigo-600">Hub</span> }
        @else if (theme() === 'dark') { <span class="text-cosmic-silver">KósmosHub</span> }
        @else { <span class="text-mars-red">KósmosHub</span> }
      </span>
    </div>
    <div class="flex items-center gap-4 text-[9px] tracking-widest uppercase font-mono leading-tight break-words whitespace-normal text-right">
      <span>v1.0.0-MVP Enterprise Baseline</span>
      <span class="hidden md:inline text-current/30">•</span>
      <span class="hidden md:inline text-current/70">Telemetry Secured by Bearer JWT</span>
      <span>•</span>
      <span class="font-sans normal-case opacity-90">© 2026 KósmosHub. All rights reserved.</span>
    </div>
  </footer>
</div>
