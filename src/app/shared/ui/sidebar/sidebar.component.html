<aside class="w-full h-full flex flex-col bg-inherit border-r shadow-2xl backdrop-blur-xl overflow-hidden transition-all duration-500 ease-in-out"
       [ngClass]="{
         'bg-white/80 border-slate-200 text-slate-900': theme() === 'light',
         'bg-space-blue-dark/90 border-white/10 text-cosmic-silver': theme() === 'dark',
         'bg-pure-black/95 border-mars-red/30 text-mars-red': theme() === 'red'
       }">
  
  <div class="flex items-center h-16 w-full px-2 flex-shrink-0">
    
    <a routerLink="/dashboard" (click)="handleNavigationClick()" 
       class="w-16 h-16 flex-shrink-0 flex items-center justify-center relative cursor-pointer z-20 block transition-transform active:scale-95">
      
      <img [src]="getLogoExpandedUrl()" alt="Logo Ícone" 
           class="absolute w-full h-full p-2 object-contain transition-opacity duration-500 ease-in-out"
           [ngClass]="layoutService.isSidebarExpanded() ? 'opacity-100 scale-100' : 'opacity-0 scale-95 pointer-events-none'">
           
      <img [src]="getLogoCollapsedUrl()" alt="Logo Completa" 
           class="absolute w-full h-full p-2 object-contain transition-opacity duration-500 ease-in-out"
           [ngClass]="layoutService.isSidebarExpanded() ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100'">
    </a>

    <div class="transition-all duration-500 ease-in-out overflow-hidden whitespace-nowrap h-full flex items-center cursor-pointer z-20"
         [ngClass]="layoutService.isSidebarExpanded() ? 'max-w-xs opacity-100 ml-1 delay-150' : 'max-w-0 opacity-0 ml-0 pointer-events-none'"
         routerLink="/dashboard" (click)="handleNavigationClick()">
      <h2 class="font-heading font-bold tracking-widest uppercase text-base shrink-0 select-none">
        @if (theme() === 'light') {
          <span class="text-slate-900">Kósmos</span><span class="text-indigo-600">Hub</span>
        } @else if (theme() === 'dark') {
          <span class="text-cosmic-silver">KósmosHub</span>
        } @else {
          <span class="text-mars-red">KósmosHub</span>
        }
      </h2>
    </div>
  </div>

  <nav class="flex-1 py-2 flex flex-col gap-2 overflow-x-hidden w-full select-none px-2">

    <button (click)="layoutService.toggleSidebar()"
            class="flex items-center text-left w-full h-9 rounded-lg transition-colors duration-300 group focus:outline-none active:scale-95"
            [ngClass]="theme() === 'red' ? 'hover:bg-mars-red/10 text-mars-red' : 'hover:bg-current/10'">
      
      <span class="w-16 h-full flex items-center justify-center flex-shrink-0">
        <i class="fa-solid text-lg opacity-70 group-hover:opacity-100 transition-transform duration-300" 
           [ngClass]="layoutService.isSidebarExpanded() ? 'fa-chevron-left' : 'fa-bars'"></i>
      </span>

      <div class="transition-all duration-500 ease-in-out overflow-hidden whitespace-nowrap"
           [ngClass]="layoutService.isSidebarExpanded() ? 'max-w-xs opacity-100 delay-150' : 'max-w-0 opacity-0'">
        <span class="font-bold text-[11px] uppercase tracking-widest">Recolher Menu</span>
      </div>
    </button>

    <div class="h-px my-0.5 opacity-10 mx-auto transition-all duration-500" 
         [ngClass]="[theme() === 'red' ? 'bg-mars-red' : 'bg-current', layoutService.isSidebarExpanded() ? 'w-full' : 'w-12']"></div>

    <a routerLink="/dashboard" (click)="handleNavigationClick()" 
       class="flex items-center text-left w-full h-9 rounded-lg transition-colors duration-300 group active:scale-95"
       [ngClass]="theme() === 'red' ? 'hover:bg-mars-red/10 hover:text-mars-red' : 'hover:bg-current/10'">
      
      <span class="w-16 h-full flex items-center justify-center flex-shrink-0">
        <i class="fa-solid fa-chart-pie text-lg opacity-70 group-hover:opacity-100"></i>
      </span>

      <div class="transition-all duration-500 ease-in-out overflow-hidden whitespace-nowrap"
           [ngClass]="layoutService.isSidebarExpanded() ? 'max-w-xs opacity-100 delay-150' : 'max-w-0 opacity-0'">
        <span class="font-bold text-[11px] uppercase tracking-widest">Controle de Missão</span>
      </div>
    </a>
    
    <a routerLink="/feed" (click)="handleNavigationClick()" 
       class="flex items-center text-left w-full h-9 rounded-lg transition-colors duration-300 group active:scale-95"
       [ngClass]="theme() === 'red' ? 'hover:bg-mars-red/10 hover:text-mars-red' : 'hover:bg-current/10'">
      
      <span class="w-16 h-full flex items-center justify-center flex-shrink-0">
        <i class="fa-solid fa-camera-retro text-lg opacity-70 group-hover:opacity-100"></i>
      </span>

      <div class="transition-all duration-500 ease-in-out overflow-hidden whitespace-nowrap"
           [ngClass]="layoutService.isSidebarExpanded() ? 'max-w-xs opacity-100 delay-150' : 'max-w-0 opacity-0'">
        <span class="font-bold text-[11px] uppercase tracking-widest">Registros de Obs.</span>
      </div>
    </a>
  </nav>
</aside>
