<header class="h-20 transition-colors duration-500 flex items-center justify-between px-4 lg:px-6 backdrop-blur-md z-30 sticky top-0 relative w-full"
        [ngClass]="{
          'bg-white/60 text-slate-900': theme() === 'light',
          'bg-space-blue/60 text-white': theme() === 'dark',
          'bg-pure-black/60 text-mars-red': theme() === 'red'
        }">
  
  <div class="flex items-center h-full relative z-20">
    <div class="lg:hidden relative flex items-center h-full select-none">
      
      <a routerLink="/dashboard" 
         class="w-48 h-16 flex items-center justify-start cursor-pointer transition-transform active:scale-98 -mt-2 -ml-2 block relative z-30 pointer-events-auto">
        <img [src]="theme() === 'dark' ? '/assets/images/logo-name-grey.png' : (theme() === 'red' ? '/assets/images/logo-name-red.png' : '/assets/images/logo-name.png')" 
             class="w-full h-full object-contain object-left-top">
      </a>
      
      <button (click)="layoutService.toggleSidebar()" 
              class="absolute top-[65px] left-1 z-40 w-7 h-7 rounded-full border shadow-md flex items-center justify-center active:scale-90 active:translate-y-0.5 active:shadow-inner active:brightness-90 transition-all duration-75 focus:outline-none pointer-events-auto"
              [ngClass]="{
                'bg-slate-100 border-slate-300 text-slate-900': theme() === 'light',
                'bg-space-blue border-white/20 text-white': theme() === 'dark',
                'bg-pure-black border-mars-red text-mars-red': theme() === 'red'
              }">
        <i class="fa-solid fa-chevron-right text-xs translate-x-[0.5px]"></i>
      </button>
    </div>

    <i class="fa-solid fa-satellite-dish opacity-50 hidden lg:block mr-3"></i>
  </div>

  <div class="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 z-10 pointer-events-none md:static md:translate-x-0 md:left-0 md:top-0 md:translate-y-0 md:pointer-events-auto flex-1 md:flex md:items-center justify-center md:justify-start">
    <span class="text-xs uppercase tracking-widest font-bold opacity-80 whitespace-nowrap"
          [ngClass]="{
            'text-slate-900': theme() === 'light',
            'text-white': theme() === 'dark',
            'text-mars-red': theme() === 'red'
          }">
      {{ pageTitle() }}
    </span>
  </div>

  <div class="relative z-20">
    <button (click)="toggleProfileMenu()" class="flex items-center gap-3 focus:outline-none group active:scale-95 transition-transform">
      <div class="text-right hidden md:block">
        <p class="text-xs font-bold leading-tight uppercase tracking-wider">{{ userFirstName() }}</p>
      </div>
      
      <div class="w-10 h-10 rounded-full border-2 overflow-hidden transition-all duration-300 flex items-center justify-center bg-current/10"
           [ngClass]="theme() === 'red' ? 'border-mars-red group-hover:shadow-[0_0_10px_rgba(239,68,68,0.5)]' : 'border-current/30 group-hover:border-current/60'">
        @if (userAvatarUrl()) {
          <img [src]="userAvatarUrl()" class="w-full h-full object-cover">
        } @else {
          <i class="fa-solid fa-user-astronaut text-lg opacity-80"></i>
        }
      </div>
    </button>

    @if (isMenuOpen()) {
      <div class="absolute right-0 mt-3 w-48 rounded-2xl shadow-xl border overflow-hidden backdrop-blur-2xl transition-all z-50 animate-fade-in-down"
           [ngClass]="{
             'bg-white/90 border-slate-200': theme() === 'light',
             'bg-space-blue-dark/95 border-white/10': theme() === 'dark',
             'bg-pure-black/95 border-mars-red/30': theme() === 'red'
           }">
        <ul class="flex flex-col py-2">
          <li>
            <a href="javascript:void(0)" class="flex items-center gap-3 px-4 py-3 text-xs uppercase tracking-widest font-bold transition-colors active:bg-current/20"
               [ngClass]="theme() === 'red' ? 'hover:bg-mars-red/10 text-mars-red' : 'hover:bg-current/10'">
              <i class="fa-solid fa-id-badge w-4"></i> Meu Perfil
            </a>
          </li>
          <div class="h-px w-full my-1" [ngClass]="theme() === 'red' ? 'bg-mars-red/20' : 'bg-current/10'"></div>
          <li>
            <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-xs uppercase tracking-widest font-bold transition-colors active:bg-red-500/20"
                    [ngClass]="theme() === 'red' ? 'hover:bg-mars-red/20 text-mars-red' : 'hover:bg-red-500/10 text-red-500'">
              <i class="fa-solid fa-power-off w-4"></i> Encerrar Sessão
            </button>
          </li>
        </ul>
      </div>
    }
  </div>
</header>
